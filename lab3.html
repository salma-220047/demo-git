<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task 3 - Built-in Functions</title>
</head>
<body>

<h2>JavaScript Built-in Functions Demo</h2>
<button onclick="runTask()">Click Me</button>

<script>
function runTask() {

    // 1. Alert
    alert("Welcome to Nexora Website!");

    // 2. Prompt
    let name = prompt("Enter your name:");

    // 3. Display using alert
    alert("Hello " + name + "! Welcome!");

    // 4. Console log
    console.log("User name is: " + name);
    console.log("Task 3 executed successfully");

}
</script>

</body>
</html>
