    <header>

                <img src="images/logo.png" alt="Nexora" class="logo-img">

            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>

                </ul>
            </nav>

    <main class="section">

            <div class="review-layout">

                <div class="review-form-card">

                        </div>
                        <div class="form-group">
                            <label>Comment</label>

                </div>
            </div>
