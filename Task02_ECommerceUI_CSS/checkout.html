<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aurum</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container">
            <a href="index.html" class="logo-wrapper">
                <img src="images/logo.png" alt="Nexora" class="logo-img">
                <span class="logo-text">Aurum</span>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="login.php">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="checkout-layout">
                <div class="checkout-form-area">
                    <h2 style="margin-bottom: 2.5rem; font-size: 2.5rem;">Secure Checkout</h2>
                    <form class="premium-form">
                        <section class="form-section">
                            <h4>Shipping Information</h4>
                            <div class="form-row"
                                style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem;">
                                <div class="form-group">
                                    <label>First Name</label>
                                    <input type="text" class="form-control" placeholder="John">
                                </div>
                                <div class="form-group">
                                    <label>Last Name</label>
                                    <input type="text" class="form-control" placeholder="Doe">
                                </div>
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label>Email Address</label>
                                <input type="email" class="form-control" placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label>Shipping Address</label>
                                <input type="text" class="form-control"
                                    placeholder="123 Luxury Lane, Beverly Hills, CA">
                            </div>
                        </section>

                        <section class="form-section">
                            <h4>Payment Details</h4>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label>Cardholder Name</label>
                                <input type="text" class="form-control" placeholder="John Doe">
                            </div>
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label>Card Number</label>
                                <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                <div class="form-group">
                                    <label>Expiry Date</label>
                                    <input type="text" class="form-control" placeholder="MM / YY">
                                </div>
                                <div class="form-group">
                                    <label>CVV</label>
                                    <input type="text" class="form-control" placeholder="123">
                                </div>
                            </div>
                        </section>

                        <div style="display: flex; gap: 1.5rem; margin-top: 1rem;">
                            <a href="products.html" class="btn btn-outline" style="flex: 1;">Return to Shop</a>
                            <button type="submit" class="btn btn-primary" style="flex: 2;">Complete Purchase</button>
                        </div>
                    </form>
                </div>

                <aside class="order-summary-sidebar">
                    <div class="summary-card">
                        <h3>Order Summary</h3>
                        <div class="summary-item">
                            <span>Nexora Chrono Watch</span>
                            <span>$850.00</span>
                        </div>
                        <div class="summary-item">
                            <span>Noir Leather Tote</span>
                            <span>$420.00</span>
                        </div>
                        <div class="summary-item">
                            <span>Shipping</span>
                            <span style="color: #2ecc71;">Free</span>
                        </div>
                        <div class="summary-item" style="margin-top: 2rem;">
                            <span>Subtotal</span>
                            <span>$1,270.00</span>
                        </div>
                        <div class="summary-item total">
                            <span>Total Amount</span>
                            <span>$1,270.00</span>
                        </div>
                        <p style="font-size: 0.8rem; color: #888; margin-top: 2rem; text-align: center;">Secure 256-bit
                            SSL Encrypted Payment</p>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Nexora Nexora</p>
        </div>
    </footer>
</body>

</html>
